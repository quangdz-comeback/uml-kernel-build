name: Build Static SLIRP

on:
  push:
    paths:
      - 'slirp.c'
      - 'Makefile'
      - 'slirp.yaml'
      - '.github/workflows/slirp.yml'
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build-slirp:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Install build dependencies
      # ------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            pkg-config \
            libslirp-dev \
            libglib2.0-dev \
            libpcre3-dev \
            libvdeplug-dev \
            libyaml-dev \
            git

      # ------------------------------------------------------------
      # Clone and build libvdeslirp (static .a)
      # ------------------------------------------------------------
      - name: Build libvdeslirp static
        run: |
          git clone --depth 1 https://github.com/virtualsquare/libvdeslirp.git

          cat > libvdeslirp/CMakeLists.txt << 'CMAKEOF'
          cmake_minimum_required(VERSION 3.16)
          project(vdeslirp LANGUAGES C)
          set(CMAKE_C_STANDARD 11)
          set(CMAKE_C_FLAGS "-O2 -Wall -Wextra -pedantic")
          set(CMAKE_POSITION_INDEPENDENT_CODE ON)
          include(GNUInstallDirs)
          configure_file(config.h.in config.h)
          add_library(vdeslirp STATIC libvdeslirp.c)
          target_include_directories(vdeslirp PRIVATE ${CMAKE_CURRENT_SOURCE_DIR} ${CMAKE_CURRENT_BINARY_DIR})
          target_link_libraries(vdeslirp PRIVATE slirp pthread glib-2.0)
          set_target_properties(vdeslirp PROPERTIES OUTPUT_NAME "vdeslirp")
          install(TARGETS vdeslirp DESTINATION ${CMAKE_INSTALL_LIBDIR})
          install(FILES libvdeslirp.h DESTINATION ${CMAKE_INSTALL_INCLUDEDIR})
          CMAKEOF

          mkdir -p libvdeslirp/build && cd libvdeslirp/build
          cmake ..
          make -j$(nproc)

      # ------------------------------------------------------------
      # Build STATIC slirp binary (from repo sources)
      # ------------------------------------------------------------
      - name: Build STATIC slirp binary
        run: |
          make static \
            VDESLIRP_SRC=libvdeslirp \
            VDESLIRP_BUILD=libvdeslirp/build \
            SYSLIB=/usr/lib/x86_64-linux-gnu

          echo "=== Verify ==="
          file slirp
          ldd slirp 2>&1 || true
          ls -lh slirp

      # ------------------------------------------------------------
      # Upload artifact
      # ------------------------------------------------------------
      - name: Upload slirp artifact
        uses: actions/upload-artifact@v4
        with:
          name: slirp-static
          path: |
            slirp
            slirp.yaml
